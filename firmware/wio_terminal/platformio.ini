; PlatformIO project for the Wio Terminal front-panel firmware.
;
; This target reuses the hardware-independent `core` component
; (firmware/components/core) unmodified, and adds thin Arduino-based
; drivers here for the Wio Terminal's own screen/buttons/speaker/microSD,
; plus the external MAX31855 / plate NTC / relay hardware described in
; docs/firmware-plan.md. It is separate from the ESP-IDF/ESP32-C3
; reference app in firmware/ (see firmware/README.md "Board-specific
; runtime status").
[env:wio_terminal]
platform = atmelsam
board = seeed_wio_terminal
framework = arduino

; The `core` component lives outside this project directory and has no
; Arduino/ESP-IDF dependency, so it is pulled in as a plain PlatformIO
; library via lib_extra_dirs rather than copied.
lib_extra_dirs = ../components

lib_deps =
    https://github.com/Seeed-Studio/Seeed_GFX.git
    https://github.com/Seeed-Studio/Seeed_Arduino_FS.git

build_flags =
    -std=gnu++17
    -Wall
    -Wextra
build_unflags =
    -std=gnu++11

monitor_speed = 115200
